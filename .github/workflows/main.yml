---
name: Run tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby 3.4
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Lint with Rubocop
        run: bundle exec rubocop

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby 3.4
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Build gem
        run: bundle exec rake build

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version:
          - "3.1"
          - "3.2"
          - "3.3"
          - "3.4"
          - "4.0"
          - truffleruby-head
        rails-version:
          - "6_1"
          - "7_0"
          - "7_1"
          - "7_2"
          - "8_0"
          - "8_1"
        exclude:
          - ruby-version: "3.4"
            rails-version: "6_1"
          - ruby-version: "4.0"
            rails-version: "6_1"
          - ruby-version: "3.4"
            rails-version: "7_0"
          - ruby-version: "4.0"
            rails-version: "7_0"
          - ruby-version: "3.1"
            rails-version: "8_0"
          - ruby-version: "3.1"
            rails-version: "8_1"
    env:
      BUNDLE_GEMFILE: gemfiles/rails_${{ matrix.rails-version }}.gemfile

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Run tests
        run: bin/rspec
